$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123",
      "gender": "male"
    }
