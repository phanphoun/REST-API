$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/users'
order: 3000
headers:
  - key: Authorization
    value: Bearer {{accessToken}}
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "gender": "male"
    }
