$kind: http-request
name: Update User
method: PUT
url: '{{baseUrl}}/users/{{userId}}'
order: 4000
headers:
  - key: Authorization
    value: Bearer {{accessToken}}
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Updated",
      "email": "john.updated@example.com",
      "gender": "male"
    }
